spring:
  application:
    name: govcms-admin
  datasource:
    url: jdbc:mysql://localhost:3306/govcms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

logging:
  level:
    root: INFO
    gov.cms: DEBUG

jwt:
  secret: govcms-super-secret-jwt-key-please-change-in-production-2026
  expiration: 86400000
