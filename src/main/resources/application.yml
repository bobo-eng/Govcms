spring:
  application:
    name: govcms-admin
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

logging:
  level:
    root: INFO
    gov.cms: DEBUG

jwt:
  secret: govcms-super-secret-jwt-key-please-change-in-production-2026
  expiration: 86400000

app:
  media:
    storage-path: ./storage/media